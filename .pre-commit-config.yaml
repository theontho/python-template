repos:
  - repo: local
    hooks:
      - id: verify-dev
        name: verify developer identity
        entry: uv run python scripts/verify_dev.py
        language: system
        pass_filenames: false
      - id: pytest-coverage
        name: pytest coverage
        entry: uv run pytest --cov=python_template --cov-fail-under=80
        language: system
        pass_filenames: false
        stages: [pre-push]
      - id: build-package
        name: build package
        entry: uv build
        language: system
        pass_filenames: false
        stages: [pre-push]
      - id: cli-smoke
        name: cli smoke test
        entry: uv run python-template --version
        language: system
        pass_filenames: false
        stages: [pre-push]
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.20.0
    hooks:
      - id: mypy
        additional_dependencies:
          - pydantic
          - platformdirs
          - rich
        args: [--strict, --ignore-missing-imports, src, scripts]
        pass_filenames: false
